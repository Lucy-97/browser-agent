services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qiyuan
      MYSQL_USER: qiyuan
      MYSQL_PASSWORD: qiyuan
    ports:
      - "${MYSQL_PORT:-24307}:3306"
    volumes:
      - qiyuan_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7.2
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-27380}:6379"
    volumes:
      - qiyuan_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30



volumes:
  qiyuan_mysql_data:
  qiyuan_redis_data:
