services:
  mysql:
    image: mysql:8.0
    container_name: qiyuan-mysql-prod
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qiyuan
      MYSQL_USER: qiyuan
      MYSQL_PASSWORD: qiyuan
    ports:
      - "43306:3306"
    volumes:
      - qiyuan_prod_mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7.2
    container_name: qiyuan-redis-prod
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "46379:6379"
    volumes:
      - qiyuan_prod_redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ../backend-api
    container_name: qiyuan-api-prod
    restart: always
    ports:
      - "48001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_ADDR: ":8001"
      MYSQL_DSN: "qiyuan:qiyuan@tcp(mysql:3306)/qiyuan?parseTime=true&charset=utf8mb4&loc=Local"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      INTERNAL_SECRET: "${INTERNAL_SECRET:-prod-secret}"
      PUBLIC_WEB_BASE_URL: "${PUBLIC_WEB_BASE_URL:-http://localhost:43000}"
    networks:
      - app-network

  web:
    build:
      context: ../frontend-web
    container_name: qiyuan-web-prod
    restart: always
    ports:
      - "43000:3000"
    depends_on:
      - api
    environment:
      GO_API_BASE_URL: "http://api:8001"
      NODE_ENV: "production"
    networks:
      - app-network

  admin:
    build:
      context: ../frontend-admin
    container_name: qiyuan-admin-prod
    restart: always
    ports:
      - "45174:3000"
    networks:
      - app-network

  tunnel-web:
    image: cloudflare/cloudflared:latest
    container_name: qiyuan-tunnel-web
    command: tunnel --url http://web:3000
    networks:
      - app-network
    depends_on:
      - web

  tunnel-admin:
    image: cloudflare/cloudflared:latest
    container_name: qiyuan-tunnel-admin
    command: tunnel --url http://admin:3000
    networks:
      - app-network
    depends_on:
      - admin

  worker:
    build:
      context: ../worker/local-cli
    container_name: qiyuan-worker-prod
    restart: always
    depends_on:
      - api
    environment:
      BROWSER_AGENT_WORKER_ALLOW_INSECURE_FILE_SECRETS: "1"
      PYTHONUNBUFFERED: "1"
      LLM_PROVIDER: "${LLM_PROVIDER:-gemini}"
      LLM_MODEL: "${LLM_MODEL:-gemini-2.5-pro}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_BASE_URL: "${LLM_BASE_URL}"
      WORKER_SERVER_URL: "http://api:8001"

    volumes:
      - qiyuan_prod_worker_data:/root/.local/share/qiyuan-worker-default
    networks:
      - app-network

volumes:
  qiyuan_prod_mysql_data:
  qiyuan_prod_redis_data:
  qiyuan_prod_worker_data:

networks:
  app-network:
    driver: bridge
