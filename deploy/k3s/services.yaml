# BrowserAgent K3s Services + Ingress
#
# 由 install.sh deploy 调用，envsubst 注入 ${APP_DOMAIN}。
# Ingress 使用 K3s 默认的 traefik，HTTPS 由 cert-manager 或 traefik 自动签发。
---
apiVersion: v1
kind: Service
metadata: { name: gateway }
spec:
  selector: { app: gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: api }
spec:
  selector: { app: api }
  ports: [{ port: 8001, targetPort: 8001 }]
---
apiVersion: v1
kind: Service
metadata: { name: ai-engine }
spec:
  selector: { app: ai-engine }
  ports: [{ port: 8002, targetPort: 8002 }]
---
apiVersion: v1
kind: Service
metadata: { name: web }
spec:
  selector: { app: web }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: admin }
spec:
  selector: { app: admin }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: browser-agent-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  rules:
    - host: ${APP_DOMAIN}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: gateway, port: { number: 8080 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: web, port: { number: 3000 } } }
    - host: admin.${APP_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: admin, port: { number: 80 } } }
  tls:
    - hosts:
        - ${APP_DOMAIN}
        - admin.${APP_DOMAIN}
      secretName: browser-agent-tls
