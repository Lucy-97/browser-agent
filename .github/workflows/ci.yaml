name: browser-agent CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 注意：本仓库为多模块（每个服务独立 go.mod / package.json），
# 各 job 用 working-directory 进入对应服务，不在仓库根跑 go ./...。

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend-api/go.mod
          cache-dependency-path: |
            backend-gateway/go.sum
            backend-api/go.sum
      - name: gateway — vet & build & test
        working-directory: backend-gateway
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go vet ./...
          go build ./...
          go test ./...
      - name: api — vet & build & test
        working-directory: backend-api
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go vet ./...
          go build ./...
          go test ./...

  frontend-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: web — typecheck & build
        working-directory: frontend-web
        run: |
          npm ci
          npx tsc --noEmit
          npm run build --if-present

  production-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验生产部署脚本和 Compose
        working-directory: deploy/production
        run: |
          bash -n check-env.sh deploy.sh migrate.sh
          cp .env.example .env
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${GITHUB_SHA}/" .env
          sed -i "s/^R2_ACCOUNT_ID=.*/R2_ACCOUNT_ID=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa/" .env
          mkdir -p secrets
          openssl rand -hex 32 > secrets/jwt_secret.txt
          openssl rand -hex 32 > secrets/internal_api_secret.txt
          openssl rand -hex 24 > secrets/db_password.txt
          openssl rand -hex 24 > secrets/redis_password.txt
          openssl rand -hex 16 > secrets/r2_access_key_id.txt
          openssl rand -hex 32 > secrets/r2_secret_access_key.txt
          printf 'browser_agent:secret@tcp(mysql.example.internal:3306)/browser_agent?parseTime=true&tls=true\n' > secrets/mysql_dsn.txt
          PRODUCTION_ENV_FILE="$PWD/.env" bash check-env.sh
          docker compose --env-file .env -f compose.yaml config --quiet

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: admin — typecheck & build
        working-directory: frontend-admin
        run: |
          test ! -e vite.config.ts
          test ! -e src/main.tsx
          npm ci
          npx tsc --noEmit
          npm run build --if-present
